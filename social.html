<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Social Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; --card: #ffffff; --text: #050505; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; }
        .tabs { display: flex; width: 100%; background: white; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: bold; color: #65676b; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .card { background: var(--card); border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        input, textarea { width: 93%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
        button { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
        .post { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); text-align: left; }
        .post-author { font-weight: bold; color: #050505; margin-bottom: 5px; }
        .post-time { font-size: 11px; color: #65676b; margin-bottom: 10px; }
        .post-media img, .post-media iframe { width: 100%; border-radius: 6px; margin-top: 10px; }
        .chat-box { background: white; height: 300px; overflow-y: auto; border: 1px solid #ddd; border-radius: 6px; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; max-width: 75%; font-size: 14px; }
        .message.incoming { background: #e4e6eb; align-self: flex-start; color: black; }
        .message.outgoing { background: var(--primary); color: white; align-self: flex-end; }
        .msg-meta { font-size: 9px; margin-top: 3px; display: block; opacity: 0.7; }
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; width: 100%; max-width: 350px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="card" style="width: 100%;">
            <h2>Join Social Hub</h2>
            <p style="color:#666; font-size:13px; margin-top:-10px;">Enter a nickname to enter the global feed</p>
            <input type="text" id="username-input" placeholder="Choose a Username...">
            <button onclick="loginUser()">Enter App</button>
        </div>
    </div>

    <div id="main-app" class="container hidden">
        <div class="tabs">
            <div id="tab-feed" class="tab active" onclick="switchTab('feed')">📰 Social Feed</div>
            <div id="tab-chat" class="tab" onclick="switchTab('chat')">💬 Global Chat</div>
        </div>

        <div id="view-feed">
            <div class="card">
                <h3>Create a Post</h3>
                <textarea id="post-text" placeholder="What's on your mind?"></textarea>
                <input type="text" id="post-media-url" placeholder="Optional: Paste Image or YouTube URL...">
                <button onclick="createPost()">Post to Feed</button>
            </div>
            <div id="feed-container"></div>
        </div>

        <div id="view-chat" class="hidden">
            <div class="card">
                <h3>Global Chatroom</h3>
                <div class="chat-box" id="chat-container"></div>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="chat-input" placeholder="Type a message..." style="margin-bottom:0;">
                    <button onclick="sendChatMessage()" style="width: 80px;">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://zmniyeokodyckfsxinmc.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inptbml5ZW9rb2R5Y2tmc3hpbm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDQxOTYsImV4cCI6MjA5NTYyMDE5Nn0.DjDYDjXTJip6yWrNJAkINopQu6KZ2W9zFgwvIbMZQb4";

        // Initialized safely using a unique name to prevent shadowing crashes
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = localStorage.getItem('social_username') || null;

        function loginUser() {
            const username = document.getElementById('username-input').value.trim();
            if (!username) { alert("Please enter a username!"); return; }
            localStorage.setItem('social_username', username);
            currentUser = username;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            loadData();
            startRealtimeListeners();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('view-feed').classList.add('hidden');
            document.getElementById('view-chat').classList.add('hidden');
            if (tabName === 'feed') {
                document.getElementById('tab-feed').classList.add('active');
                document.getElementById('view-feed').classList.remove('hidden');
            } else {
                document.getElementById('tab-chat').classList.add('active');
                document.getElementById('view-chat').classList.remove('hidden');
                scrollChatBottom();
            }
        }

        async function createPost() {
            const text = document.getElementById('post-text').value.trim();
            const mediaUrl = document.getElementById('post-media-url').value.trim();
            if (!text) return;
            await db.from('posts').insert([{ author: currentUser, content: text, media_url: mediaUrl, created_at: new Date() }]);
            document.getElementById('post-text').value = "";
            document.getElementById('post-media-url').value = "";
        }

        function addPostToUI(post) {
            const container = document.getElementById('feed-container');
            const postEl = document.createElement('div');
            postEl.className = 'post';
            let mediaHTML = "";
            if (post.media_url) {
                if (post.media_url.includes('youtube.com') || post.media_url.includes('youtu.be')) {
                    const videoId = post.media_url.split('v=')[1] || post.media_url.split('/').pop();
                    mediaHTML = `<div class="post-media"><iframe height="200" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe></div>`;
                } else {
                    mediaHTML = `<div class="post-media"><img src="${post.media_url}"></div>`;
                }
            }
            postEl.innerHTML = `<strong>${post.author}</strong><div class="post-time">${new Date(post.created_at).toLocaleTimeString()}</div><div>${post.content}</div>${mediaHTML}`;
            container.insertBefore(postEl, container.firstChild);
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const msgText = input.value.trim();
            if (!msgText) return;
            await db.from('messages').insert([{ sender: currentUser, text: msgText, created_at: new Date() }]);
            input.value = "";
        }

        function addMessageToUI(msg) {
            const container = document.getElementById('chat-container');
            const msgEl = document.createElement('div');
            const isOutgoing = msg.sender === currentUser;
            msgEl.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            msgEl.innerHTML = `<strong>${msg.sender}:</strong> ${msg.text}<span class="msg-meta">${new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`;
            container.appendChild(msgEl);
            scrollChatBottom();
        }

        function scrollChatBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        async function loadData() {
            const { data: posts } = await db.from('posts').select('*').order('created_at', { ascending: true });
            if (posts) { document.getElementById('feed-container').innerHTML = ""; posts.forEach(addPostToUI); }
            const { data: messages } = await db.from('messages').select('*').order('created_at', { ascending: true });
            if (messages) { document.getElementById('chat-container').innerHTML = ""; messages.forEach(addMessageToUI); }
        }

        function startRealtimeListeners() {
            db.channel('posts-channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, p => { addPostToUI(p.new); }).subscribe();
            db.channel('messages-channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => { addMessageToUI(p.new); }).subscribe();
        }

        if (currentUser) {
            document.getElementById('username-input').value = currentUser;
            loginUser();
        }
    </script>
</body>
              </html>
